<body>
    <h1>Formula cilindrului</h1>
    <p>Volumul unui cilindru se calculează folosind formula:</p>
    <p><strong>V = πr²h</strong></p>

   <script>
    
    var r = prompt("Introduceți raza cilindrului:");
    var h = prompt("Introduceți înălțimea cilindrului:");

    var volum = 3.14 * r * r * h;

    alert("Volumul cilindrului este: " + volum);




   </script>

 

</body>
